<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Hobby House</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
    <!--Navigation Bar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light top-navbar">
        <div class="container-fluid navbar-container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo.png" alt="Arcadia Logo" style="height: 45px; margin-right: 8px; object-fit: contain;">
                <div class="d-none d-lg-block">
                    <div style="font-weight: bold; color: #2c3e50; line-height: 1;">Arcadia</div>
                    <div style="font-size: 0.75rem; color: #7f8c8d;">Hobby House</div>
                </div>
            </a>

            <!--Search Bar-->
            <div class="search-bar-wrapper flex-grow-1 mx-lg-4">
                <form class="position-relative" id="searchForm" autocomplete="off">
                    <input type="text" id="searchInput" class="form-control search-input" placeholder="Search products, categories..." aria-label="Search">
                    <button class="btn search-btn" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                    <div id="suggestions" class="suggestions-list d-none"></div>
                </form>
            </div>

            <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <div class="navbar-nav ms-auto mt-3 mt-lg-0 d-flex align-items-lg-center gap-lg-3">
                    <div class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Categories <i class="bi bi-chevron-down"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Board Games</a></li>
                            <li><a class="dropdown-item" href="#">Trading Cards</a></li>
                            <li><a class="dropdown-item" href="#">LEGO Sets</a></li>
                            <li><a class="dropdown-item" href="#">Collectibles</a></li>
                            <li><a class="dropdown-item" href="#">Puzzles</a></li>
                            <li><a class="dropdown-item" href="#">Art Supplies</a></li>
                            <li><a class="dropdown-item" href="#">All Categories</a></li>
                        </ul>
                    </div>

                    <a class="nav-link" href="#">Featured</a>

                    <a class="nav-link" href="#">Best Sellers</a>

                    <a class="nav-link profile-icon d-inline-flex" href="#">
                        <i class="bi bi-person-fill"></i>
                    </a>

                    <a class="nav-link cart-icon d-inline-flex" href="#">
                        <i class="bi bi-cart2"></i>
                        <span class="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="searchFeedback" class="text-muted mb-2">Search products by name, category, or description.</div>
        <div id="productGrid" class="row g-3"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
